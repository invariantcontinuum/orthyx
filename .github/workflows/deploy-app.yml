name: Deploy App

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-app
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_PATH: /home/${{ secrets.WEBSERVER_USERNAME }}/${{ github.event.repository.name }}
      DOCKER_NETWORK: orthyxai-network
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install rsync and SSH client
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync openssh-client

      - name: Configure SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.WEBSERVER_SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.WEBSERVER_IP }}
        run: |
          set -euo pipefail
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "Missing secret: WEBSERVER_SSH_PRIVATE_KEY"
            exit 1
          fi
          if [ -z "$HOST" ]; then
            echo "Missing secret: WEBSERVER_IP"
            exit 1
          fi
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/id_rsa"
          chmod 600 "$HOME/.ssh/id_rsa"
          touch "$HOME/.ssh/known_hosts"
          ssh-keyscan -H "$HOST" >> "$HOME/.ssh/known_hosts"
          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Sync files to webserver
        env:
          HOST: ${{ secrets.WEBSERVER_IP }}
          USERNAME: ${{ secrets.WEBSERVER_USERNAME }}
        run: |
          set -euo pipefail
          ssh "$USERNAME@$HOST" "mkdir -p '$DEPLOY_PATH'"
          rsync -az --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".env" \
            -e "ssh" \
            ./ "$USERNAME@$HOST:$DEPLOY_PATH/"

      - name: Deploy with Docker Compose
        env:
          HOST: ${{ secrets.WEBSERVER_IP }}
          USERNAME: ${{ secrets.WEBSERVER_USERNAME }}
        run: |
          set -euo pipefail
          ssh "$USERNAME@$HOST" "
            set -euo pipefail
            cd '$DEPLOY_PATH'
            docker network inspect '$DOCKER_NETWORK' >/dev/null 2>&1 || docker network create '$DOCKER_NETWORK'

            if docker compose version >/dev/null 2>&1; then
              docker compose up -d --build --remove-orphans
            elif command -v docker-compose >/dev/null 2>&1; then
              docker-compose up -d --build --remove-orphans
            else
              echo 'Neither docker compose nor docker-compose is installed on the server.'
              exit 1
            fi
          "
